[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 110
target-version = "py312"
exclude = ["alembic", "migrations", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
# E501 (line length) is noisy on this codebase's aligned dicts; ignore it.
ignore = ["E501", "E741"]
